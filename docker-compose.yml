version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    # Монтируем папку, чтобы изменения в коде или файлы базы данных (linguatrack.db) сохранялись на компьютере
    volumes:
      - ./backend:/app
      - /app/venv # Игнорируем внутреннее окружение контейнера
    environment:
      - DATABASE_URL=sqlite:///./linguatrack.db
    restart: always

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules # Чтобы не затереть модули контейнера локальными
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend
    restart: always